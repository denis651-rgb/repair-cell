spring.datasource.url=${DB_URL:jdbc:sqlite:${user.home}/.taller-celular/data/repair-shop.db}
spring.datasource.driver-class-name=org.sqlite.JDBC
spring.jpa.database-platform=org.hibernate.community.dialect.SQLiteDialect
spring.jpa.properties.hibernate.enable_lazy_load_no_trans=true

spring.jpa.hibernate.ddl-auto=update

spring.sql.init.mode=never

spring.cache.type=simple

app.bootstrap-admin.enabled=true
app.bootstrap-admin.username=${BOOTSTRAP_ADMIN_USERNAME:admin}
app.bootstrap-admin.password=${BOOTSTRAP_ADMIN_PASSWORD:admin123}
app.bootstrap-admin.nombre=${BOOTSTRAP_ADMIN_NOMBRE:Administrador Principal}

jwt.secret=${JWT_SECRET:desktop-local-secret-key-123456789012345678901234567890}

app.backup.enabled=true
app.backup.cron=0 0 1 * * *
app.backup.directory=${APP_BACKUP_DIRECTORY:${APP_STORAGE_DIR:${user.home}/.taller-celular}/backups}
app.backup.zip-enabled=true
app.backup.retention-days=30
app.backup.google-drive-enabled=false
app.backup.google-drive-folder-id=
app.backup.google-service-account-key-path=
